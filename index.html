<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Штчат - User</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCqrQF6xkIY6rDPDA1zjocPW8PTHkjJY4Y",
  authDomain: "shtchat-7a834.firebaseapp.com",
  projectId: "shtchat-7a834",
  storageBucket: "shtchat-7a834.firebasestorage.app",
  messagingSenderId: "926718616479",
  appId: "1:926718616479:web:58501d627f839b159513aa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// send message
window.sendMsg = async function () {
  let text = document.getElementById("text").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    from: "👤 User",
    text: text,
    role: "user",
    time: Date.now()
  });

  document.getElementById("text").value = "";
}

// load chat
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  let box = document.getElementById("messages");
  box.innerHTML = "";

  snapshot.forEach((doc) => {
    let m = doc.data();

    let div = document.createElement("div");
    div.className = "msg";

    if (m.role === "admin") {
      div.style.color = "lightgreen";
    }

    div.innerText = m.from + ": " + m.text;
    box.appendChild(div);
  });
});
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#111);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

.box{
  width:400px;
  height:550px;
  background:#111;
  border-radius:15px;
  display:flex;
  flex-direction:column;
}

.header{
  padding:10px;
  background:black;
  text-align:center;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.input{
  display:flex;
}

input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button{
  padding:10px;
  background:green;
  color:white;
  border:none;
}
.msg{
  margin:5px 0;
  padding:6px;
  background:#222;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
  <div class="header">💬 Штчат User</div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="text" placeholder="Савол навис..." />
    <button onclick="sendMsg()">➡</button>
  </div>
</div>

</body>
</html>
